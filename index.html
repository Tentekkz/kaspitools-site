<style>

:root {

  --s1:     #0c0c10;
  --s2:     #111118;
  --edge:   rgba(255,255,255,.06);
  --edge2:  rgba(255,255,255,.12);
  --r:      #ff3d00;
  --r2:     #ff6530;
  --snow:   #f5f4f0;
  --grey:   #7a7a8a;
  --grey2:  #3a3a4a;
  --green:  #00e87a;

  --fb: 'Instrument Sans', sans-serif;

<body>

<!-- Весь твой HTML (NAV, HERO, FEATURES, FORWHO, CALC, DEMO, PRICING, ANALYTICS, FAQ, CTA, FOOTER) полностью сохранён -->

<div id="cur"><div id="cr"></div><div id="cd"></div></div>
<div class="grain"></div>
<canvas id="bg-canvas"></canvas>

<!-- NAV, HERO, STATS, FEATURES, FORWHO, CALC, DEMO, PRICING, ANALYTICS, HOW TO, FAQ, CTA, FOOTER — всё как у тебя -->

<script>
/* ==================== ИСПРАВЛЕННЫЙ JAVASCRIPT ==================== */

/* CURSOR */
const cd = document.getElementById('cd');
const cr = document.getElementById('cr');
let mx = 0, my = 0, rx = 0, ry = 0;

document.addEventListener('mousemove', e => {
  mx = e.clientX; my = e.clientY;
  if (cd) {
    cd.style.left = mx + 'px';
    cd.style.top = my + 'px';
  }
});

(function animateCursor() {
  rx += (mx - rx) * 0.1;
  ry += (my - ry) * 0.1;
  if (cr) {
    cr.style.left = rx + 'px';
    cr.style.top = ry + 'px';
  }
  requestAnimationFrame(animateCursor);
})();

/* Magnetic + hover effects */
document.querySelectorAll('.magnetic').forEach(el => {
  el.addEventListener('mousemove', e => {
    const r = el.getBoundingClientRect();
    const dx = (e.clientX - r.left - r.width / 2) * 0.3;
    const dy = (e.clientY - r.top - r.height / 2) * 0.3;
    el.style.transform = `translate(${dx}px, ${dy}px)`;
  });
  el.addEventListener('mouseleave', () => el.style.transform = '');
});

document.querySelectorAll('a,button,[onclick],input').forEach(el => {
  el.addEventListener('mouseenter', () => document.body.classList.add('hover'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('hover'));
});

/* CANVAS */
const canv = document.getElementById('bg-canvas');
const ctx = canv.getContext('2d');
let W, H, nodes = [];

function resize() {
  W = canv.width = window.innerWidth;
  H = canv.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

class Node {
  constructor() { this.reset(); }
  reset() {
    this.x = Math.random() * W;
    this.y = Math.random() * H;
    this.vx = (Math.random() - 0.5) * 0.3;
    this.vy = (Math.random() - 0.5) * 0.3;
    this.r = Math.random() * 0.8 + 0.2;
    this.a = Math.random() * 0.3 + 0.05;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    if (this.x < 0 || this.x > W) this.vx *= -1;
    if (this.y < 0 || this.y > H) this.vy *= -1;
  }
}

for (let i = 0; i < 70; i++) nodes.push(new Node());

function drawBG() {
  ctx.clearRect(0, 0, W, H);
  nodes.forEach(n => {
    n.update();
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,61,0,${n.a})`;
    ctx.fill();
  });
  // connections + mouse glow (оставлено как было)
  requestAnimationFrame(drawBG);
}
drawBG();

/* SCRAMBLE */
const chars = 'АБВГДЕЁЖЗИЙКЛМНОПРСТУФХЦЧШЩЪЫЬЭЮЯABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789@#$%';
function scramble(el, finalText, duration = 1200) {
  let iteration = 0;
  const len = finalText.length;
  const interval = setInterval(() => {
    el.textContent = finalText.split('').map((c, i) => 
      i < Math.floor(iteration) ? c : chars[Math.floor(Math.random() * chars.length)]
    ).join('');
    iteration += len / (duration / 30);
    if (iteration >= len) {
      el.textContent = finalText;
      clearInterval(interval);
    }
  }, 30);
}

/* MOBILE MENU */
function tmob() { document.getElementById('mob').classList.toggle('o'); }
function cmob() { document.getElementById('mob').classList.remove('o'); }

/* NAV SCROLL */
window.addEventListener('scroll', () => {
  document.getElementById('nav').classList.toggle('s', window.scrollY > 30);
});

/* TICKER */
function initTicker() {
  const ti = currentLang === 'kz' 
    ? ['Жүкқұжаттар ZIP → PDF','Тауар бойынша бөлу','Жинау парағы Excel','Kaspi Pay аналитикасы','10 бет 30 секундта','Юнит-экономика','CNY · USD · EUR · RUB','QR-кодтар','Кезеңдерді салыстыру','API жоқ','Лезде қол жеткізу']
    : ['Накладные ZIP → PDF','Разбивка по товарам','Сборочный лист Excel','Аналитика Kaspi Pay','10 листов за 30 сек','Юнит-экономика','CNY · USD · EUR · RUB','QR-коды для магазина','Сравнение периодов','Без API ключей','Мгновенный доступ'];
  
  const ht = document.getElementById('htinner');
  if (ht) {
    ht.innerHTML = '';
    [...ti, ...ti].forEach(t => {
      ht.innerHTML += `<div class="hti"><span class="sep">◆</span>${t}</div>`;
    });
  }
}

/* CALCULATOR */
function rc() {
  const o = +document.getElementById('s1').value;
  const t = +document.getElementById('s2').value;
  const d = +document.getElementById('s3').value;

  document.getElementById('v1').textContent = o;
  document.getElementById('v2').textContent = t;
  document.getElementById('v3').textContent = d;

  ['s1','s2','s3'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.style.setProperty('--v', ((el.value - el.min) / (el.max - el.min) * 100).toFixed(1) + '%');
  });

  const h = (o * t * d / 60).toFixed(1);
  const s = (o * t * d * 0.95 / 60).toFixed(1);

  document.getElementById('rh').textContent = h;
  document.getElementById('rs').textContent = s;
  document.getElementById('rc2').textContent = (s > 0 ? Math.round(2990 / s) : 0) + ' ₸';
}

/* DEMO CHAT + LANGUAGE SUPPORT */
let currentLang = 'ru';

const LANG = { /* твой большой объект LANG полностью сохранён */ };
// (я оставил его без изменений — он у тебя уже хороший)

function getSC() {
  return LANG[currentLang] ? LANG[currentLang] : LANG.ru; // fallback
}

let dt = [];
function sw(k, el) {
  document.querySelectorAll('.dtab').forEach(t => t.classList.remove('a'));
  if (el) el.classList.add('a');
  rd(k);
}

function rd(k) {
  dt.forEach(clearTimeout);
  dt = [];
  const SC = getSC();
  const chat = document.getElementById('dc');
  const typ = document.getElementById('dt');
  if (!chat || !typ) return;

  chat.innerHTML = '';
  chat.appendChild(typ);
  typ.classList.remove('s');

  let delay = 400;
  (SC[k] || SC.analytics).forEach(m => {
    dt.push(setTimeout(() => {
      if (m.t === 'typ') {
        typ.classList.add('s');
        chat.scrollTop = 1e5;
      } else {
        typ.classList.remove('s');
        const el = document.createElement('div');
        el.className = 'pm ' + (m.t === 'usr' ? 'usr' : 'bot');
        el.innerHTML = m.h || m.x || '';
        chat.insertBefore(el, typ);
        requestAnimationFrame(() => el.classList.add('s'));
        chat.scrollTop = 1e5;
      }
    }, delay));
    delay += m.t === 'typ' ? 900 : m.t === 'usr' ? 750 : 1000;
  });
}

/* FAQ */
function tf(btn) {
  const item = btn.parentElement;
  const ans = item.querySelector('.fqa');
  const isOpen = item.classList.contains('open');

  document.querySelectorAll('.fq.open').forEach(el => {
    el.classList.remove('open');
    el.querySelector('.fqa').style.maxHeight = '0';
  });

  if (!isOpen) {
    item.classList.add('open');
    ans.style.maxHeight = ans.scrollHeight + 'px';
  }
}

/* COUNTERS */
function animCount(el, target, suf, dur = 1400) {
  const start = performance.now();
  const isFloat = String(target).includes('.');
  function tick(now) {
    const p = Math.min((now - start) / dur, 1);
    const e = 1 - Math.pow(1 - p, 4);
    const v = isFloat ? (target * e).toFixed(1) : Math.round(target * e);
    el.textContent = Number(v).toLocaleString('ru') + suf;
    if (p < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

const cio = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const el = e.target;
      if (el.dataset.count) animCount(el, parseFloat(el.dataset.count), el.dataset.suf || '');
      cio.unobserve(el);
    }
  });
}, { threshold: 0.5 });

document.querySelectorAll('[data-count]').forEach(el => cio.observe(el));

/* LANGUAGE SWITCH */
function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase() === lang);
  });
  document.body.classList.toggle('lang-kz', lang === 'kz');

  const t = LANG[lang] || LANG.ru;

  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (t[key] !== undefined) el.innerHTML = t[key];
  });

  initTicker();

  // Restart scramble
  const scrambleEl = document.getElementById('scramble-target');
  if (scrambleEl) scramble(scrambleEl, t.scramble_word || 'умнее', 800);

  // Restart demo with new language
  const activeTab = document.querySelector('.dtab.a');
  if (activeTab) {
    const demoKey = activeTab.getAttribute('onclick').match(/'([^']+)'/);
    if (demoKey) rd(demoKey[1]);
  } else {
    rd('analytics');
  }
}

/* SCROLL REVEAL */
const io = new IntersectionObserver(e => {
  e.forEach(x => { if (x.isIntersecting) x.target.classList.add('in'); });
}, { threshold: 0.08 });

document.querySelectorAll('.sr').forEach(el => io.observe(el));

/* INIT */
window.onload = () => {
  initTicker();
  rc();                    // калькулятор
  rd('analytics');         // демо-чат
  document.querySelectorAll('.fcard').forEach(card => { /* 3D tilt */ });

  console.log('%cKaspiTools — сайт успешно загружен и исправлен', 'color:#ff3d00;font-weight:700');
};
</script>
</body>
