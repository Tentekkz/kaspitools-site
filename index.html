<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KaspiTools — Telegram-бот для Kaspi продавцов | Накладные, аналитика, калькулятор</title>
<meta name="description" content="Автоматизируй рутину за 10 секунд. Накладные ZIP→PDF, аналитика из Kaspi Pay, калькулятор маржи. Первый отчёт бесплатно.">
<meta property="og:title" content="KaspiTools — Инструменты для Kaspi продавцов">
<meta property="og:description" content="Накладные за 10 сек, аналитика из Kaspi Pay, калькулятор маржи.">
<meta property="og:type" content="website">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%230a0a0a'/><text y='23' x='5' font-size='20' font-family='sans-serif' font-weight='900' fill='%23ff3d00'>K</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@200;300;400;700;900&family=Nunito:wght@800;900&family=Instrument+Sans:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
/* ══════════════════════════════════════════
   TOKENS
══════════════════════════════════════════ */
:root {
  --void:   #060608;
  --s1:     #0c0c10;
  --s2:     #111118;
  --edge:   rgba(255,255,255,.06);
  --edge2:  rgba(255,255,255,.12);
  --r:      #ff3d00;   /* radical red-orange */
  --r2:     #ff6530;
  --snow:   #f5f4f0;
  --grey:   #7a7a8a;
  --grey2:  #3a3a4a;
  --green:  #00e87a;
  --fh: 'Unbounded', sans-serif;
  --fb: 'Instrument Sans', sans-serif;
  --fm: 'JetBrains Mono', monospace;
  --e: cubic-bezier(.16,1,.3,1);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth;overflow-x:hidden}
body{font-family:var(--fb);background:var(--void);color:var(--snow);overflow-x:hidden;cursor:none;line-height:1.6}
a{text-decoration:none;color:inherit}
::selection{background:var(--r);color:#fff}

/* ── KZ FONT OVERRIDE ── */
body.lang-kz .mega-line,
body.lang-kz .h2,
body.lang-kz .ctah,
body.lang-kz .fc-title,
body.lang-kz .fwtitle,
body.lang-kz .fws-n,
body.lang-kz .pamount,
body.lang-kz .sbn {
  font-family: 'Nunito', sans-serif !important;
  letter-spacing: -.02em;
}
body.lang-kz .mega-line { line-height: .9; }
body.lang-kz .stag { font-family: var(--fm) !important; }

/* ── CUSTOM CURSOR ── */
#cur{position:fixed;z-index:99999;pointer-events:none;top:0;left:0}
#cd{position:absolute;width:8px;height:8px;background:var(--r);border-radius:50%;transform:translate(-50%,-50%);transition:width .35s var(--e),height .35s var(--e),border-radius .35s,background .35s}
#cr{position:absolute;width:36px;height:36px;border:1px solid rgba(255,61,0,.4);border-radius:50%;transform:translate(-50%,-50%);transition:width .2s var(--e),height .2s var(--e),border-color .3s,border-radius .3s}
body.hover #cd{width:56px;height:56px;background:rgba(255,61,0,.12);border-radius:50%}
body.hover #cr{width:56px;height:56px;border-color:transparent}

/* ── GRAIN ── */
.grain{position:fixed;inset:-200%;width:400%;height:400%;opacity:.02;pointer-events:none;z-index:9997;animation:grain 5s steps(7) infinite;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}
@keyframes grain{0%{transform:translate(0,0)}14%{transform:translate(-4%,-8%)}100%{transform:translate(0,0)}}

/* ── NAV ── */
nav{position:fixed;top:0;left:0;right:0;z-index:500;height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 5%;border-bottom:1px solid var(--edge);background:rgba(6,6,8,.88);backdrop-filter:blur(28px)}
.nlogo{font-family:var(--fh);font-size:.95rem;font-weight:900;letter-spacing:-.03em}
.lang-sw{display:flex;background:rgba(255,255,255,.06);border:1px solid var(--edge2);border-radius:6px;padding:2px}
.lang-btn{font-family:var(--fh);font-size:.62rem;font-weight:700;padding:.3rem .6rem;border-radius:4px;border:none;background:transparent;color:var(--grey);cursor:pointer}
.lang-btn.active{background:var(--r);color:#fff}

/* ══ HERO ══════════════════════════════════════════ */
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;padding:0 5%;}
.mega-line{font-family:var(--fh);font-size:clamp(4rem,12vw,14rem);font-weight:900;line-height:.85;letter-spacing:-.05em;text-transform:uppercase;}
.red{color:var(--r)}

/* ══ CALC ══ */
.calcsec{background:var(--s1);padding:100px 5%}
.cbox{max-width:800px;margin:0 auto;background:var(--s2);border:1px solid var(--edge);border-radius:20px;padding:40px}
.crow{margin-bottom:30px}
.clbl{display:block;color:var(--grey);margin-bottom:10px;font-size:.8rem}
input[type=range]{width:100%;accent-color:var(--r)}
.cresults{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--edge);margin-top:20px;border-radius:12px;overflow:hidden}
.cs{background:var(--void);padding:25px;text-align:center}
.csn{font-family:var(--fh);font-size:2rem;font-weight:900}

/* ── FOOTER ── */
footer{border-top:1px solid var(--edge);padding:40px 5%;background:var(--void);text-align:center}
</style>
</head>
<body>

<div id="cur"><div id="cd"></div><div id="cr"></div></div>
<div class="grain"></div>

<nav>
  <div class="nlogo">KASPITOOLS</div>
  <div class="lang-sw">
    <button class="lang-btn active" onclick="setLang('ru')">RU</button>
    <button class="lang-btn" onclick="setLang('kz')">KZ</button>
  </div>
</nav>

<section class="hero">
  <div class="mega-line"><span data-i18n="h1">Продавай</span></div>
  <div class="mega-line red"><span data-i18n="h2">Быстрее</span></div>
  <div class="mega-line"><span data-i18n="h3">На Kaspi</span></div>
  <div id="scramble-target" style="font-family:var(--fm); color:var(--grey); margin-top:20px; font-size:1.2rem"></div>
</section>

<section class="calcsec">
  <div class="cbox">
    <div class="crow">
      <span class="clbl" data-i18n="c_p">Цена продажи:</span>
      <input type="range" id="c-price" min="5000" max="1000000" value="150000" oninput="updateCalc()">
      <div class="csn" id="v-price">150 000 ₸</div>
    </div>
    <div class="crow">
      <span class="clbl" data-i18n="c_c">Себестоимость:</span>
      <input type="range" id="c-cost" min="1000" max="800000" value="90000" oninput="updateCalc()">
      <div class="csn" id="v-cost">90 000 ₸</div>
    </div>
    <div class="cresults">
      <div class="cs">
        <div class="csn red" id="res-profit">0 ₸</div>
        <div class="clbl" data-i18n="res_p">Чистая прибыль</div>
      </div>
      <div class="cs">
        <div class="csn" id="res-margin">0%</div>
        <div class="clbl" data-i18n="res_m">Маржинальность</div>
      </div>
      <div class="cs">
        <div class="csn" id="res-roi">0%</div>
        <div class="clbl">ROI</div>
      </div>
    </div>
  </div>
</section>

<footer>
  <div class="nlogo">KASPITOOLS</div>
  <p style="color:var(--grey2); margin-top:10px">© 2024 Все права защищены</p>
</footer>

<script>
/* ══════════════════════════════════════════
   LOGIC
══════════════════════════════════════════ */
const LANG = {
  ru: {
    h1: 'Продавай', h2: 'Быстрее', h3: 'На Kaspi',
    c_p: 'Цена продажи', c_c: 'Себестоимость',
    res_p: 'Чистая прибыль', res_m: 'Маржинальность',
    scramble_word: 'автоматизация',
    ticker: ['Накладные за 10 сек', 'Аналитика Kaspi Pay', 'Калькулятор маржи']
  },
  kz: {
    h1: 'Kaspi-де', h2: 'Жылдам', h3: 'Сат',
    c_p: 'Сату бағасы', c_c: 'Өзіндік құны',
    res_p: 'Таза пайда', res_m: 'Маржа',
    scramble_word: 'жұмыс',
    ticker: ['Жүкқұжаттар 10 сек', 'Kaspi Pay аналитикасы', 'Маржа калькуляторы']
  }
};

let currentLang = 'ru';

function setLang(lang) {
  currentLang = lang;
  document.body.classList.toggle('lang-kz', lang === 'kz');
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.textContent.toLowerCase() === lang));
  
  const t = LANG[lang];
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const k = el.getAttribute('data-i18n');
    if(t[k]) el.innerText = t[k];
  });

  scramble(document.getElementById('scramble-target'), t.scramble_word, 1000);
  document.title = lang === 'kz' ? 'KaspiTools — Kaspi сатушыларына арналған бот' : 'KaspiTools — бот для Kaspi продавцов';
  updateCalc();
}

function updateCalc() {
  const price = parseInt(document.getElementById('c-price').value);
  const cost = parseInt(document.getElementById('c-cost').value);
  
  document.getElementById('v-price').innerText = price.toLocaleString() + ' ₸';
  document.getElementById('v-cost').innerText = cost.toLocaleString() + ' ₸';

  const comm = price * 0.11; // 11% средняя комиссия
  const tax = price * 0.03;  // 3% налог
  const profit = price - cost - comm - tax;
  const margin = ((profit / price) * 100).toFixed(1);
  const roi = ((profit / cost) * 100).toFixed(1);

  document.getElementById('res-profit').innerText = Math.round(profit).toLocaleString() + ' ₸';
  document.getElementById('res-margin').innerText = margin + '%';
  document.getElementById('res-roi').innerText = roi + '%';
}

function scramble(el, word, duration) {
  if (!el) return;
  const chars = 'ABCDEFGHIKLMNOPQRSTVXYZ0123456789';
  let iteration = 0;
  const interval = setInterval(() => {
    el.innerText = word.split("").map((l, i) => {
      if (i < iteration) return word[i];
      return chars[Math.floor(Math.random() * 33)];
    }).join("");
    if (iteration >= word.length) clearInterval(interval);
    iteration += 1 / 3;
  }, duration / word.length / 3);
}

// Курсор
const cur = document.getElementById('cur');
document.addEventListener('mousemove', e => {
  cur.style.transform = `translate3d(${e.clientX}px, ${e.clientY}px, 0)`;
});

document.querySelectorAll('button, a, input').forEach(el => {
  el.addEventListener('mouseenter', () => document.body.classList.add('hover'));
  el.addEventListener('mouseleave', () => document.body.classList.remove('hover'));
});

// Запуск
window.onload = () => {
  setLang('ru');
};
</script>
</body>
</html>
